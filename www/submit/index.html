<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv | Submit Form</title>
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>

    <header class="header">
        <nav class="container">
            <a href="/" class="logo">Webserv</a>
            <div class="nav-links">
                <a href="/pages/methods/upload.html">Upload (POST)</a>
                <a href="/pages/methods/submit.html">Submit (POST)</a>
                <a href="/pages/methods/delete.html">Delete (DELETE)</a>
                <a href="/cgi-bin/script.py">CGI Demo</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Submit a Form</h1>
            <p class="subtitle">Sends a POST request with <code>application/x-www-form-urlencoded</code> body.</p>
        </section>

        <div class="form-card">
            <h2>Contact Form</h2>
            <p class="desc">Fill in the fields below and submit. We will never contact you.</p>

            <form method="POST" action="/submit">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Say hello!" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="container">
        <p>&copy; 2026 42 School Project &mdash; Nikolai Efimov, Tanya Semenova, Daria Timofeeva</p>
    </footer>

</body>
</html>
